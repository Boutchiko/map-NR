<!DOCTYPE html>
<html>
<head>
  <title>Carte NRP</title>

  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
    }

    img {
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
  </style>
</head>

<body oncontextmenu="return false">

<img src="map.png">

<script>
  // bloque clic droit
  document.addEventListener("contextmenu", e => e.preventDefault());

  // bloque drag image
  document.addEventListener("dragstart", e => e.preventDefault());

  // bloque certaines touches
  document.addEventListener("keydown", function(e) {
    if (e.key === "F12" || 
       (e.ctrlKey && e.shiftKey && e.key === "I") ||
       (e.ctrlKey && e.key === "U")) {
      e.preventDefault();
    }
  });
</script>

</body>
</html>
