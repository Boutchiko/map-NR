<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte NRP</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b0b;
      font-family: Arial, sans-serif;
      color: white;
    }

    * {
      box-sizing: border-box;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    #viewer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      background: #000;
      touch-action: none;
    }

    #viewer.dragging {
      cursor: grabbing;
    }

    #world {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    #map {
      display: block;
      width: 7547.5306px;
      height: 4029.0498px;
      max-width: none;
      max-height: none;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      image-rendering: auto;
    }

    .marker {
      position: absolute;
      width: 34px;
      height: 34px;
      transform: translate(-50%, -50%);
      cursor: pointer;
      pointer-events: auto;
      z-index: 5;
      background: transparent;
      border: none;
      outline: none;
      padding: 0;
      opacity: 0;
    }

    .marker.hidden {
      display: none;
    }

    .tooltip {
      position: absolute;
      min-width: 180px;
      max-width: 280px;
      background: rgba(20, 20, 20, 0.96);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 10px 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      z-index: 50;
      display: none;
      pointer-events: none;
    }

    .tooltip::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
    }

    .tooltip.arrow-bottom::after {
      bottom: -10px;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid rgba(20, 20, 20, 0.96);
    }

    .tooltip.arrow-top::after {
      top: -10px;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 10px solid rgba(20, 20, 20, 0.96);
    }

    .tooltip-title {
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .tooltip-text {
      font-size: 13px;
      line-height: 1.4;
      color: #ddd;
      white-space: pre-line;
    }

    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 360px;
      max-width: calc(100vw - 70px);
      height: 100%;
      background: rgba(14, 14, 14, 0.96);
      border-right: 1px solid rgba(255,255,255,0.08);
      z-index: 30;
      transform: translateX(0);
      transition: transform 0.25s ease;
      overflow-y: auto;
      padding: 18px 14px;
    }

    #sidebar.closed {
      transform: translateX(-100%);
    }

    #toggleSidebar {
      position: absolute;
      top: 14px;
      left: 359px;
      z-index: 40;
      border: none;
      background: rgba(20,20,20,0.95);
      color: white;
      padding: 10px 12px;
      border-radius: 0 10px 10px 0;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: left 0.25s ease, border-radius 0.25s ease;
      border-left: 1px solid rgba(255,255,255,0.08);
    }

    #toggleSidebar.closed {
      left: 14px;
      border-radius: 10px;
    }

    #sidebar h2 {
      margin: 0 0 10px 0;
      font-size: 22px;
    }

    .intro-block {
      margin-bottom: 18px;
    }

    .intro-text {
      margin: 0 0 10px 0;
      color: #cfcfcf;
      font-size: 14px;
      line-height: 1.55;
    }

    .intro-list {
      margin: 0 0 12px 18px;
      padding-left: 18px;
      color: #e8e8e8;
      font-size: 14px;
      line-height: 1.6;
    }

    .intro-list li {
      margin-bottom: 6px;
    }

    .section {
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .legend-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .legend-item {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: white;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .legend-item:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.14);
    }

    #coords {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 100;
      pointer-events: none;
    }

    @media (max-width: 700px) {
      #sidebar {
        width: 280px;
      }
    }
  </style>
</head>
<body oncontextmenu="return false">
  <div id="app">
    <button id="toggleSidebar" title="Ouvrir / fermer la légende">☰</button>

    <aside id="sidebar">
      <h2>Carte NRP</h2>

      <div class="intro-block">
        <p class="intro-text">
          Voici une carte réalisée par l'escouade de <strong>Izumi Okuzami</strong>.
        </p>

        <p class="intro-text">
          Le cartographe étant <strong>Taro Okuwakabe</strong>, accompagné du reste de son escouade d'éclaireurs :
        </p>

        <ul class="intro-list">
          <li>Riitchi Mizuhara</li>
          <li>Yamakaji Edosen</li>
          <li>Yoru Mizuki</li>
        </ul>
      </div>

      <div class="section">
        <div class="section-title">Lieux principaux</div>
        <div class="legend-list" id="legendList"></div>
      </div>
    </aside>

    <div id="viewer">
      <div id="world">
        <img id="map" src="cartographie-nrp.svg" alt="Carte NRP" draggable="false" />
      </div>
    </div>

    <div id="tooltip" class="tooltip">
      <div class="tooltip-title" id="tooltipTitle"></div>
      <div class="tooltip-text" id="tooltipText"></div>
    </div>

    <div id="coords">X: 0 | Y: 0</div>
  </div>

  <script>
    const viewer = document.getElementById("viewer");
    const world = document.getElementById("world");
    const map = document.getElementById("map");

    const sidebar = document.getElementById("sidebar");
    const toggleSidebarBtn = document.getElementById("toggleSidebar");
    const legendList = document.getElementById("legendList");

    const tooltip = document.getElementById("tooltip");
    const tooltipTitle = document.getElementById("tooltipTitle");
    const tooltipText = document.getElementById("tooltipText");
    const coordsDisplay = document.getElementById("coords");

    const SVG_VIEWBOX_WIDTH = 7547.5306;
    const SVG_VIEWBOX_HEIGHT = 4029.0498;

    let mapWidth = SVG_VIEWBOX_WIDTH;
    let mapHeight = SVG_VIEWBOX_HEIGHT;

    let scale = 1;
    let minScale = 0.12;
    let maxScale = 8;

    let offsetX = 0;
    let offsetY = 0;

    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;

    let activeMarker = null;
    let markersCreated = false;

    const locations = [
      {
        id: "palais",
        label: "Palais",
        x: 3658,
        y: 1728,
        zoom: 2.5,
        title: "Palais",
        text: "Palais du Kazekage."
      },
      {
        id: "place",
        label: "Place Centrale",
        x: 3656,
        y: 1795,
        zoom: 2.5,
        title: "Place Centrale",
        text: "Place centrale du village."
      },
      {
        id: "police_1",
        label: "Poste de Police",
        x: 3757,
        y: 1717,
        zoom: 2.5,
        title: "Poste de Police",
        text: "Commissariat principal."
      },
      {
        id: "hospital_1",
        label: "Hôpital",
        x: 3725,
        y: 1850,
        zoom: 2.5,
        title: "Hôpital",
        text: "Centre hospitalier."
      },
      {
        id: "dojo",
        label: "Dojo",
        x: 3440,
        y: 1650,
        zoom: 2.5,
        title: "Dojo",
        text: "Dojo de Taijutsu"
      },
      {
        id: "arene1",
        group: "arene",
        groupLabel: "Arène",
        label: "Arène académique",
        x: 3453,
        y: 1757,
        zoom: 2.5,
        title: "Arène académie",
        text: "Arène d'entrainement"
      },
      {
        id: "arene2",
        group: "arene",
        groupLabel: "Arène",
        label: "Arène 2",
        x: 3449,
        y: 1842,
        zoom: 2.5,
        title: "Arène 2",
        text: "Arène d'entrainement"
      },
      {
        id: "arene3",
        group: "arene",
        groupLabel: "Arène",
        label: "Arène 3",
        x: 3712,
        y: 1999,
        zoom: 2.5,
        title: "Arène 3",
        text: "Arène d'entrainement"
      },
      {
        id: "flag1",
        group: "flag",
        groupLabel: "Flag",
        label: "Drapeau du Pays du Vent",
        x: 2836,
        y: 1826,
        zoom: 2.5,
        title: "Drapeau",
        text: ""
      },
      {
        id: "flag2",
        group: "flag",
        groupLabel: "Flag",
        label: "Drapeau du Pays du Vent",
        x: 3780,
        y: 1195,
        zoom: 2.5,
        title: "Drapeau",
        text: ""
      },
      {
        id: "flag3",
        group: "flag",
        groupLabel: "Flag",
        label: "Drapeau du Pays du Vent",
        x: 4134,
        y: 2599,
        zoom: 2.5,
        title: "Drapeau",
        text: ""
      },
      {
        id: "flag4",
        group: "flag",
        groupLabel: "Flag",
        label: "Drapeau du Pays du Vent",
        x: 4033,
        y: 2800,
        zoom: 2.5,
        title: "Drapeau",
        text: ""
      },
      {
        id: "oasis1",
        group: "oasis",
        groupLabel: "Oasis",
        label: "Oasis",
        x: 3619,
        y: 1509,
        zoom: 2.5,
        title: "Oasis",
        text: ""
      },
      {
        id: "oasis2",
        group: "oasis",
        groupLabel: "Oasis",
        label: "Oasis",
        x: 4054,
        y: 1307,
        zoom: 2.5,
        title: "Oasis",
        text: ""
      },
      {
        id: "oasis3",
        group: "oasis",
        groupLabel: "Oasis",
        label: "Oasis",
        x: 2855,
        y: 2480,
        zoom: 2.5,
        title: "Oasis",
        text: ""
      },
      {
        id: "temple",
        label: "Temple",
        x: 3343,
        y: 1443,
        zoom: 2.5,
        title: "Temple",
        text: "Centre hospitalier."
      },
      {
        id: "mine",
        label: "Mine",
        x: 2836,
        y: 1826,
        zoom: 2.5,
        title: "Mine",
        text: "Zone minière."
      }
    ];

    function updateToggleButtonPosition() {
      if (sidebar.classList.contains("closed")) {
        toggleSidebarBtn.classList.add("closed");
        toggleSidebarBtn.style.left = "14px";
      } else {
        toggleSidebarBtn.classList.remove("closed");
        const sidebarWidth = sidebar.getBoundingClientRect().width;
        toggleSidebarBtn.style.left = `${sidebarWidth - 1}px`;
      }
    }

    function clampScale(value) {
      return Math.max(minScale, Math.min(maxScale, value));
    }

    function clampOffsets() {
      const rect = viewer.getBoundingClientRect();
      const scaledWidth = mapWidth * scale;
      const scaledHeight = mapHeight * scale;

      if (scaledWidth <= rect.width) {
        offsetX = (rect.width - scaledWidth) / 2;
      } else {
        const minX = rect.width - scaledWidth;
        const maxX = 0;
        offsetX = Math.max(minX, Math.min(maxX, offsetX));
      }

      if (scaledHeight <= rect.height) {
        offsetY = (rect.height - scaledHeight) / 2;
      } else {
        const minY = rect.height - scaledHeight;
        const maxY = 0;
        offsetY = Math.max(minY, Math.min(maxY, offsetY));
      }
    }

    function render() {
      clampOffsets();
      world.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }

    function screenToWorld(screenX, screenY) {
      return {
        x: (screenX - offsetX) / scale,
        y: (screenY - offsetY) / scale
      };
    }

    function zoomAt(clientX, clientY, newScale) {
      const rect = viewer.getBoundingClientRect();
      const mouseX = clientX - rect.left;
      const mouseY = clientY - rect.top;

      const worldBefore = screenToWorld(mouseX, mouseY);

      scale = clampScale(newScale);
      offsetX = mouseX - worldBefore.x * scale;
      offsetY = mouseY - worldBefore.y * scale;

      render();
      positionTooltip();
    }

    function centerOn(worldX, worldY, targetScale = scale, animate = true) {
      targetScale = clampScale(targetScale);

      const rect = viewer.getBoundingClientRect();
      const targetOffsetX = rect.width / 2 - worldX * targetScale;
      const targetOffsetY = rect.height / 2 - worldY * targetScale;

      if (!animate) {
        scale = targetScale;
        offsetX = targetOffsetX;
        offsetY = targetOffsetY;
        render();
        positionTooltip();
        return;
      }

      const startScale = scale;
      const startX = offsetX;
      const startY = offsetY;
      const duration = 350;
      const startTime = performance.now();

      function step(now) {
        const t = Math.min(1, (now - startTime) / duration);
        const eased = 1 - Math.pow(1 - t, 3);

        scale = startScale + (targetScale - startScale) * eased;
        offsetX = startX + (targetOffsetX - startX) * eased;
        offsetY = startY + (targetOffsetY - startY) * eased;

        render();
        positionTooltip();

        if (t < 1) {
          requestAnimationFrame(step);
        }
      }

      requestAnimationFrame(step);
    }

    function createMarker(location) {
      const marker = document.createElement("button");
      marker.className = "marker";
      marker.style.left = `${location.x}px`;
      marker.style.top = `${location.y}px`;
      marker.dataset.id = location.id;
      marker.title = location.title;

      marker.addEventListener("click", (e) => {
        e.stopPropagation();
        openTooltip(location, marker);
      });

      world.appendChild(marker);
      location.element = marker;
    }

    function openTooltip(location, markerEl) {
      tooltipTitle.textContent = location.title;
      tooltipText.textContent = location.text || "";
      tooltip.style.display = "block";
      activeMarker = { element: markerEl, data: location };
      positionTooltip();
    }

    function closeTooltip() {
      tooltip.style.display = "none";
      tooltip.classList.remove("arrow-top", "arrow-bottom");
      activeMarker = null;
    }

    function positionTooltip() {
      if (!activeMarker) return;

      const markerRect = activeMarker.element.getBoundingClientRect();
      const viewerRect = viewer.getBoundingClientRect();

      tooltip.classList.remove("arrow-top", "arrow-bottom");
      tooltip.style.left = "0px";
      tooltip.style.top = "0px";

      const tooltipRect = tooltip.getBoundingClientRect();

      const pointX = markerRect.left - viewerRect.left + markerRect.width / 2;
      const pointY = markerRect.top - viewerRect.top + markerRect.height / 2;

      let left = pointX - tooltipRect.width / 2;
      let top = pointY - tooltipRect.height - 18;

      if (left < 10) left = 10;
      if (left + tooltipRect.width > viewerRect.width - 10) {
        left = viewerRect.width - tooltipRect.width - 10;
      }

      if (top < 10) {
        top = pointY + 18;
        tooltip.classList.add("arrow-top");
      } else {
        tooltip.classList.add("arrow-bottom");
      }

      tooltip.style.left = `${left}px`;
      tooltip.style.top = `${top}px`;
    }

    function getLegendEntries() {
      const entries = [];
      const grouped = new Map();

      locations.forEach((loc) => {
        if (loc.group) {
          if (!grouped.has(loc.group)) {
            const groupEntry = {
              type: "group",
              key: loc.group,
              label: loc.groupLabel || loc.label,
              items: [],
              currentIndex: 0
            };
            grouped.set(loc.group, groupEntry);
            entries.push(groupEntry);
          }

          grouped.get(loc.group).items.push(loc);
        } else {
          entries.push({
            type: "single",
            item: loc
          });
        }
      });

      return entries;
    }

    function buildLegend() {
      legendList.innerHTML = "";
      const entries = getLegendEntries();

      entries.forEach((entry) => {
        const btn = document.createElement("button");
        btn.className = "legend-item";

        if (entry.type === "single") {
          btn.textContent = entry.item.label;

          btn.addEventListener("click", () => {
            centerOn(entry.item.x, entry.item.y, entry.item.zoom || 2.2, true);

            setTimeout(() => {
              openTooltip(entry.item, entry.item.element);
            }, 220);
          });
        }

        if (entry.type === "group") {
          btn.textContent = entry.label;

          btn.addEventListener("click", () => {
            const loc = entry.items[entry.currentIndex];

            centerOn(loc.x, loc.y, loc.zoom || 2.2, true);

            setTimeout(() => {
              openTooltip(loc, loc.element);
            }, 220);

            entry.currentIndex = (entry.currentIndex + 1) % entry.items.length;
          });
        }

        legendList.appendChild(btn);
      });
    }

    function fitMapInitially() {
      const rect = viewer.getBoundingClientRect();

      const scaleX = rect.width / mapWidth;
      const scaleY = rect.height / mapHeight;
      scale = clampScale(Math.min(scaleX, scaleY));

      offsetX = (rect.width - mapWidth * scale) / 2;
      offsetY = (rect.height - mapHeight * scale) / 2;

      render();
    }

    function createMarkersOnce() {
      if (markersCreated) return;
      locations.forEach(createMarker);
      markersCreated = true;
    }

    function initializeMap() {
      mapWidth = SVG_VIEWBOX_WIDTH;
      mapHeight = SVG_VIEWBOX_HEIGHT;

      fitMapInitially();
      createMarkersOnce();
      buildLegend();
      updateToggleButtonPosition();
    }

    map.addEventListener("load", initializeMap);

    map.addEventListener("error", () => {
      console.error("Impossible de charger cartographie-nrp.svg");
    });

    viewer.addEventListener("mousemove", (e) => {
      const rect = viewer.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      const worldX = (mouseX - offsetX) / scale;
      const worldY = (mouseY - offsetY) / scale;

      coordsDisplay.textContent = `X: ${Math.round(worldX)} | Y: ${Math.round(worldY)}`;
    });

    viewer.addEventListener("wheel", (e) => {
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.12 : 0.88;
      zoomAt(e.clientX, e.clientY, scale * factor);
    }, { passive: false });

    viewer.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;

      isDragging = true;
      viewer.classList.add("dragging");
      dragStartX = e.clientX - offsetX;
      dragStartY = e.clientY - offsetY;

      closeTooltip();
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;

      offsetX = e.clientX - dragStartX;
      offsetY = e.clientY - dragStartY;

      render();
      positionTooltip();
    });

    window.addEventListener("mouseup", () => {
      isDragging = false;
      viewer.classList.remove("dragging");
    });

    viewer.addEventListener("click", (e) => {
      if (e.target === viewer || e.target === world || e.target === map) {
        closeTooltip();
      }
    });

    window.addEventListener("resize", () => {
      render();
      positionTooltip();
      updateToggleButtonPosition();
    });

    toggleSidebarBtn.addEventListener("click", () => {
      sidebar.classList.toggle("closed");
      updateToggleButtonPosition();
    });

    document.addEventListener("contextmenu", (e) => e.preventDefault());
    document.addEventListener("dragstart", (e) => e.preventDefault());

    if (map.complete) {
      initializeMap();
    }
  </script>
</body>
</html>
