<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte NRP</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b0b;
      font-family: Arial, sans-serif;
      color: white;
    }

    * {
      box-sizing: border-box;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    #viewer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      background: #000;
    }

    #viewer.dragging {
      cursor: grabbing;
    }

    #world {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
    }

    #map {
      display: block;
      max-width: none;
      pointer-events: none;
    }

    .marker {
      position: absolute;
      width: 34px;
      height: 34px;
      transform: translate(-50%, -50%);
      cursor: pointer;
      pointer-events: auto;
      opacity: 0;
    }

    .tooltip {
      position: absolute;
      min-width: 180px;
      max-width: 260px;
      background: rgba(20,20,20,0.96);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 10px;
      display: none;
      z-index: 20;
    }

    .tooltip::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
    }

    .tooltip.arrow-bottom::after {
      bottom: -10px;
      border-top: 10px solid rgba(20,20,20,0.96);
    }

    .tooltip.arrow-top::after {
      top: -10px;
      border-bottom: 10px solid rgba(20,20,20,0.96);
    }

    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 360px;
      height: 100%;
      background: rgba(14,14,14,0.96);
      padding: 18px;
      transition: transform 0.25s;
    }

    #sidebar.closed {
      transform: translateX(-100%);
    }

    #toggleSidebar {
      position: absolute;
      top: 14px;
      left: 359px;
      background: #111;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
    }

    #toggleSidebar.closed {
      left: 14px;
    }

    h2 {
      margin-top: 0;
    }

    .legend-item {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      background: #222;
      border: none;
      color: white;
      cursor: pointer;
    }

    /* ===== INTRO PROPRE ===== */

    .intro-block {
      margin-bottom: 18px;
    }

    .intro-text {
      margin: 0 0 10px 0;
      color: #cfcfcf;
      font-size: 14px;
      line-height: 1.55;
    }

    .intro-list {
      margin: 0 0 10px 18px;
      padding-left: 18px;
      color: #e8e8e8;
      font-size: 14px;
      line-height: 1.6;
    }

    .intro-list li {
      margin-bottom: 6px;
    }

    #coords {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>

<body>
<div id="app">

<button id="toggleSidebar">☰</button>

<aside id="sidebar">
  <h2>Carte NRP</h2>

  <div class="intro-block">
    <p class="intro-text">
      Voici une carte réalisée par l'escouade de Izumi Okuzami.
    </p>

    <p class="intro-text">
      Le cartographe principal est <strong>Taro Okuwakabe</strong>, accompagné du reste de son escouade d'éclaireurs :
    </p>

    <ul class="intro-list">
      <li>Riitchi Mizuhara</li>
      <li>Yamakaji Edosen</li>
      <li>Yoru Mizuki</li>
    </ul>
  </div>

  <div id="legendList"></div>
</aside>

<div id="viewer">
  <div id="world">
    <img id="map" src="map.png">
  </div>
</div>

<div id="tooltip" class="tooltip"></div>
<div id="coords">X: 0 | Y: 0</div>

</div>

<script>
const viewer = document.getElementById("viewer");
const world = document.getElementById("world");
const map = document.getElementById("map");
const coordsDisplay = document.getElementById("coords");
const tooltip = document.getElementById("tooltip");

let scale = 1;
let offsetX = 0;
let offsetY = 0;

viewer.addEventListener("mousemove", (e) => {
  const rect = viewer.getBoundingClientRect();
  const x = (e.clientX - rect.left - offsetX) / scale;
  const y = (e.clientY - rect.top - offsetY) / scale;
  coordsDisplay.textContent = `X: ${Math.round(x)} | Y: ${Math.round(y)}`;
});

viewer.addEventListener("wheel", (e) => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  scale *= factor;
  world.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
});

let dragging = false;

viewer.addEventListener("mousedown", (e) => {
  dragging = true;
});

window.addEventListener("mouseup", () => dragging = false);

window.addEventListener("mousemove", (e) => {
  if (!dragging) return;
  offsetX += e.movementX;
  offsetY += e.movementY;
  world.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
});

const sidebar = document.getElementById("sidebar");
const btn = document.getElementById("toggleSidebar");

btn.onclick = () => {
  sidebar.classList.toggle("closed");
  btn.classList.toggle("closed");
};
</script>

</body>
</html>
